name: Build TTshare APK

on:
  push:
    branches: [ttshare-mobile, main, master]
    paths:
      - 'ttshare_mobile/**'
  workflow_dispatch:  # 可手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ttshare_mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.0'

      - name: Download Readability.js
        run: |
          curl -o assets/readability.js https://raw.githubusercontent.com/mozilla/readability/gh-pages/Readability.js

      - name: Download Turndown.js
        run: |
          curl -o assets/turndown.js https://raw.githubusercontent.com/mixmark-io/turndown/main/src/turndown.js

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ttshare-release-apk
          path: ttshare_mobile/build/app/outputs/flutter-apk/app-release.apk
